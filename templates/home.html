<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - AI Local Law Chatbot</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: Arial, sans-serif; color: #fff;
  }

  /* Video background */
  .video-background {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
    z-index: -1;
  }

  /* Dark overlay */
  .overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    z-index: 0;
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 40px;
    background: rgba(0, 0, 0, 0.6);
    z-index: 2;
    box-sizing: border-box;
  }

  header h1 {
    margin: 0;
    font-size: 2rem;
  }

  header a {
    margin-left: 10px;
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
    font-size: 1rem;
  }

  .signup, .login { background:black; }
  .logout { background:#d73a49; }
  header a:hover { opacity:0.9; }

  /* Main content */
  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Animated Heading */
  .typewriter {
    display: inline-block;
    font-size: 4rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0,0,0,0.7);
    border-right: .15em solid #fff;
    white-space: nowrap;
    overflow: hidden;
    animation: blink-cursor .75s step-end infinite;
  }

  @keyframes blink-cursor {
    from, to { border-color: transparent; }
    50% { border-color: white; }
  }

  /* Buttons below text */
  .main-buttons {
    margin-top: 10px;
  }

  .main-buttons a {
    display: inline-block;
    margin: 10px;
    padding: 14px 32px;
    border-radius: 8px;
    font-size: 1.2rem;
    text-decoration: none;
    cursor: pointer;
    color: white;
    background:#f39c12;
    transition: 0.3s ease;
  }

  .main-buttons a:hover {
    background: #e67e22;
    transform: scale(1.05);
  }

</style>
</head>
<body>

<!-- Video background -->
<video class="video-background" autoplay muted loop playsinline>
  <source src="../static/video1.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>

<div class="overlay"></div>

<!-- Header -->
<header>
  <h1>LawMithra</h1>
  <div class="nav-links">
    {% if username %}
      <a href="/logout" class="logout">Logout</a>
    {% else %}
      <a href="/signup" class="signup">Signup</a>
      <a href="/login" class="login">Login</a>
    {% endif %}
  </div>
</header>

<!-- Main Content -->
<div class="container">
  <h2 class="typewriter" id="welcome-text"></h2>

  <!-- Buttons appear below -->
  <div class="main-buttons">
    {% if username %}
      <a href="/chat" class="chat">💬 Let's Chat</a>
    {% else %}
      <a href="/signup" class="chat">📝 Sign Up</a>
    {% endif %}
  </div>
</div>

<!-- Typewriter Script -->
<script>
  const text = "Welcome to AI Local Law Chatbot";
  let i = 0;
  const speed = 100; // speed per letter (ms)

  function typeWriter() {
    if (i < text.length) {
      document.getElementById("welcome-text").textContent += text.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    }
  }

  window.onload = typeWriter;
</script>

</body>
</html>
